<html>
    <body>
        <h1>REGISTRATION FORM</h1>
        <form>
            <label for="name">FULL NAME:</label><br>
            <input type="text" id="name" NAME="name"><br>
            <label for="email">EMAIL ADDRESS:</label><br>
            <input type="text" id="email" NAME="email"><br>
            <label for="p">PASSWORD:</label><br>
            <input type="password" id="p" NAME="p"><br>
            <h3>GENDER:</h3>
            <input type="radio" id="m" NAME="language">
            <label for="m">MALE</label><br>
            <input type="radio" id="g" NAME="language">
            <label for="g">FEMALE</label><br>

            <label for="dat">DATE OF BIRTH:</label><br>
            <input type="text" id="dat" NAME="dat"><br>
            <h3>COURSE COMPLETED BY STUDENT</h3>
            <select name="dropdown">
                <option value="b">B.TECH</option>
                <option value="c">B.SC</option>
                <option value="l">B.COM</option>
                <option value="g">B.A</option>
            </select><br>
            <input type="checkbox" id="N" NAME="N">
            <label for="N">AGREE FOR ALL CONDITIONS</label><br>
            <a href="inter.HTML"><input type="button" name="submit" value="submit"></a>
        </form>
    </body>
</html>
