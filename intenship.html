<html>
    <head>
        <title>internship form</title>
    </head>
    <body>
        <h1><em>INTERNSHIP FORM</em></h1>
        <form>
            <label for="name">ENTER YOUR NAME:</label><br>
            <input type="text" id="name" NAME="name"><br>
            <label for="age">ENTER YOUR AGE:</label><br>
            <input type="text" id="age" NAME="age"><br>
            <label for="cgpa">ENTER YOUR CGPA:</label><br>
            <input type="text"id="cgpa" NAME="cgpa"><br>
            <h3>CLICK ON YOUR GENDER</h3>
            <input type="radio" id="M" NAME="group"VALUE="MALE" >
            <label for="M">MALE</label><br>
            <input type="radio" id="G" NAME="group" VALUE="FEMALE">
            <label for="G">FEMALE</label><br>
            <h3>SELECT WHAT YOU HAVE LEARNED PROGRAMMING LANGUAGES AT PAST?</h3>
            <input type="checkbox" id="python">
            <label for="python">PYTHON</label><br>
            <input type="checkbox" id="c">
            <label for="c">C</label><br>
            <input type="checkbox"id="java">
            <label for="java">JAVA</label><br>
            <input type="checkbox"id="javascript">
            <label for="javascript">JAVA SCRIPT</label><br>
            <input type="checkbox" id="c+">
            <label for="c+">C++</label><br>
            <h3>WRITE WHAT HAD INSPIRE TO JOIN IN OUR INTERNSHIP IN GOOGLE</h3>
            <label for="k">WRITE YOUR DESCRIPTION:</label><br>
            <input type="text" id="k"height="4cm" width="4cm">
            <h3>HOW MANY MONTHS DO YOU WANT TO APPLY FOR INTERNSHIP?</h3>
            <select name="dropdown">
                <option value="3months">3MONTHS</option>
                <option value="6month">6MONTHS</option>
                <option value="9months">9MONTHS</option>
                <option value="1year">1YEAR</option>
            </select>
            <p>select your resume</p>
            <input type="file" name="fileupload" accept=""document 2>
            <a href="inter.HTML"><input type="button" name="submit" value="SUBMIT"></a>
        </form>
    </body>
</html>
